name: CI/CD Pipeline - Heart Disease Model

# Trigger: executa quando há push na branch main que afeta arquivos da aula 06
on:
  push:
    branches:
      - main
    paths:
      - 'aula_06_cicd_automacao/**'
      - 'data/**'
      - '.github/workflows/cicd-pipeline.yml'

  # Execução manual (agora sem seleção de modelo; usar comentário no código)
  workflow_dispatch:

jobs:
  # Job 1: Testes
  test:
    name: Rodar Testes Unitários
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Rodar testes
        run: |
          cd aula_06_cicd_automacao
          python test_pipeline.py
  
  # Job 2: Treinar Modelo (fluxo único)
  train-model:
    name: Treinar Modelo
    runs-on: ubuntu-latest
    needs: test  # Só executa se os testes passarem
    
    # Configura MLflow tracking (pode usar servidor remoto ou local)
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Treinar modelo
        run: |
          cd aula_06_cicd_automacao
          python train.py --min-accuracy 0.75
      
      - name: Upload MLflow artifacts (opcional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: aula_06_cicd_automacao/mlruns/
          retention-days: 7
  
  # Job 3: Resumo
  summary:
    name: Resumo do pipeline
    runs-on: ubuntu-latest
    needs: train-model
    if: success()
    
    steps:
      - name: Resultado final
        run: |
          echo "✓ Pipeline de CI/CD concluído com sucesso!"
          echo "Modelo treinado e logado no MLflow."
          echo "Acesse o MLflow UI para acompanhar as métricas e a promoção automática."
