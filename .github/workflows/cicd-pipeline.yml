name: CI/CD Pipeline - Heart Disease Model

# Trigger: executa quando há push na branch main que afeta arquivos da aula 06
on:
  push:
    branches:
      - main
    paths:
      - 'aula_06_cicd_automacao/**'
      - 'data/**'
      - '.github/workflows/cicd-pipeline.yml'

  # Execução manual (agora sem seleção de modelo; usar comentário no código)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MLFLOW_TRACKING_URI: sqlite:///mlflow.db
  MLFLOW_ALLOW_FILE_STORE: false
  MLFLOW_TRACKING_FOLDER: .

permissions:
  contents: write

jobs:
  # Job 1: Testes
  test:
    name: Rodar Testes Unitários
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Rodar testes
        run: |
          cd aula_06_cicd_automacao
          python test_pipeline.py
  
  # Job 2: Treinar Modelo (fluxo único)
  train-model:
    name: Treinar Modelo
    runs-on: ubuntu-latest
    needs: test  # Só executa se os testes passarem
    environment: mlops
    env:
      MLFLOW_TRACKING_FOLDER: mlruns_ci_snapshot
    
    # Configura MLflow tracking (pode usar servidor remoto ou local)
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Treinar modelo
        run: |
          cd aula_06_cicd_automacao
          python train.py
      
      - name: Upload MLflow artifacts (opcional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: aula_06_cicd_automacao/${{ env.MLFLOW_TRACKING_FOLDER }}/
          retention-days: 7

      - name: Commit snapshot do MLflow (opcional)
        if: success() && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "GITHUB_TOKEN indisponível. Pulando commit do mlruns_ci."
            exit 0
          fi
          echo "GITHUB_TOKEN detectado (tamanho: ${#GITHUB_TOKEN} caracteres)."
          TRACKING_DIR="aula_06_cicd_automacao/${MLFLOW_TRACKING_FOLDER:-mlruns_ci_snapshot}"
          if [ ! -d "$TRACKING_DIR" ]; then
            echo "Diretório $TRACKING_DIR inexistente. Nada para snapshot."
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "$TRACKING_DIR"
          if git diff --cached --quiet; then
            echo "Sem alterações para commitar."
            exit 0
          fi
          git commit -m "chore(ci): atualiza snapshot mlruns [skip ci]"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:${{ github.ref_name }}
  
  register-model:
    name: Registrar Modelo
    runs-on: ubuntu-latest
    needs: train-model
    environment: mlops
    env:
      MLFLOW_TRACKING_FOLDER: mlruns_ci_snapshot
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Baixar artifacts do MLflow
        uses: actions/download-artifact@v4
        with:
          name: mlruns
          path: aula_06_cicd_automacao

      - name: Ajustar diretório do artifact
        run: |
          SRC="aula_06_cicd_automacao/aula_06_cicd_automacao/${MLFLOW_TRACKING_FOLDER}"
          DEST="aula_06_cicd_automacao/${MLFLOW_TRACKING_FOLDER}"
          if [ -d "$SRC" ]; then
            rm -rf "$DEST"
            mv "$SRC" "$DEST"
          fi

      - name: Listar conteúdo recebido
        run: |
          ls -R aula_06_cicd_automacao/${{ env.MLFLOW_TRACKING_FOLDER }} | head -n 200 || true

      - name: Verificar metadata
        run: |
          cd aula_06_cicd_automacao/${{ env.MLFLOW_TRACKING_FOLDER }}
          ls -l latest_run.json

      - name: Registrar modelo no MLflow
        run: |
          cd aula_06_cicd_automacao
          python register_model.py --metadata-path ./mlflow.db
  
  # Job 3: Resumo
  summary:
    name: Resumo do pipeline
    runs-on: ubuntu-latest
    needs: register-model
    if: success()
    
    steps:
      - name: Resultado final
        run: |
          echo "✓ Pipeline de CI/CD concluído com sucesso!"
          echo "Modelo treinado e logado no MLflow."
          echo "Acesse o MLflow UI para acompanhar as métricas e a promoção automática."
